kind = "web"
previewPath = "/"
title = "GORY Mountain Resort"
version = "1.0.0"
id = "artifacts/gory-resort"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/gory-resort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gory-resort", "run", "build" ]
serve = "static"
publicDir = "artifacts/gory-resort/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
